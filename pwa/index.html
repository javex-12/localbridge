<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LocalBridge Mobile</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="jsQR.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --cobalt-950: #020617;
            --cobalt-900: #0f172a;
            --blue-600: #2563eb;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--cobalt-950);
            color: #f1f5f9;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .glass-card:active {
            transform: scale(0.96);
            background: rgba(30, 41, 59, 0.6);
        }

        .nav-dock {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: var(--safe-bottom);
        }

        .pane {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .pane.hidden {
            display: none;
            opacity: 0;
            transform: translateY(20px) scale(0.98);
        }

        .scanner-overlay {
            background: linear-gradient(0deg, rgba(2, 6, 23, 0.8) 0%, transparent 100%);
        }

        .scanner-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--blue-600), transparent);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
            animation: scan 2.5s ease-in-out infinite;
        }

        @keyframes scan {
            0%, 100% { top: 10%; }
            50% { top: 90%; }
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #64748b;
        }

        .status-dot.active {
            background: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .dock-item.is-active {
            color: var(--blue-600);
        }

        .dock-item.is-active i {
            transform: translateY(-4px);
        }

        .indicator {
            width: 4px;
            height: 4px;
            background: var(--blue-600);
            border-radius: 50%;
            position: absolute;
            bottom: -8px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .dock-item.is-active .indicator {
            opacity: 1;
            transform: scale(1.5);
        }
    </style>
</head>
<body class="min-h-screen overflow-hidden">

<div id="app" class="relative h-screen flex flex-col">
    
    <!-- ═══ TOP STATUS BAR ═══ -->
    <header class="pt-[var(--safe-top)] px-6 h-24 flex items-center justify-between z-20">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-2xl bg-blue-600/10 border border-blue-500/20 flex items-center justify-center">
                <i data-lucide="zap" class="text-blue-500 w-5 h-5"></i>
            </div>
            <div>
                <h1 id="current-dir-label" class="text-lg font-extrabold tracking-tighter text-white uppercase italic">Workstation</h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <div id="status-dot" class="status-dot"></div>
                    <span id="session-label" class="text-[10px] font-bold uppercase tracking-widest text-slate-500 italic">Off-Air</span>
                </div>
            </div>
        </div>
        <button id="btn-upload-pro" class="w-12 h-12 rounded-2xl bg-blue-600 text-white flex items-center justify-center shadow-lg shadow-blue-600/30 active:scale-90 transition-transform">
            <i data-lucide="plus" class="w-6 h-6"></i>
        </button>
    </header>

    <!-- ═══ MAIN STAGE ═══ -->
    <main class="flex-1 relative overflow-hidden">
        
        <!-- DASHBOARD PANE -->
        <section id="home-pane" class="pane absolute inset-0 overflow-y-auto px-6 pb-32 pt-2">
            <div id="dashboard-connect" class="glass-card rounded-[32px] p-6 mb-8 flex items-center justify-between gap-4">
                <div>
                    <h4 class="font-extrabold text-white text-sm uppercase tracking-wider mb-1">Bridge Link Idle</h4>
                    <p class="text-[11px] text-slate-400 leading-relaxed font-medium">Scan to initiate native handshake.</p>
                </div>
                <button id="btn-open-scanner" class="w-12 h-12 rounded-2xl bg-slate-800 text-blue-500 flex items-center justify-center border border-white/5 active:scale-90 transition-transform">
                    <i data-lucide="qr-code" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="mb-6 flex items-center justify-between px-1">
                <h3 class="text-[11px] font-extrabold text-slate-500 uppercase tracking-[0.2em]">Quick Channels</h3>
                <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">v2.0 Native</span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button data-pick="image/*" class="category-card glass-card p-6 rounded-[32px] text-left">
                    <div class="w-12 h-12 rounded-2xl bg-blue-600/10 text-blue-500 flex items-center justify-center mb-6 border border-blue-500/10">
                        <i data-lucide="image" class="w-6 h-6"></i>
                    </div>
                    <span class="block font-extrabold text-xs mb-1 text-white uppercase tracking-wider">Imagery</span>
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Photos & Assets</span>
                </button>
                <button data-pick="video/*" class="category-card glass-card p-6 rounded-[32px] text-left">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-600/10 text-indigo-500 flex items-center justify-center mb-6 border border-indigo-500/10">
                        <i data-lucide="clapperboard" class="w-6 h-6"></i>
                    </div>
                    <span class="block font-extrabold text-xs mb-1 text-white uppercase tracking-wider">Cinema</span>
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Video Clips</span>
                </button>
                <button data-pick="audio/*" class="category-card glass-card p-6 rounded-[32px] text-left">
                    <div class="w-12 h-12 rounded-2xl bg-rose-600/10 text-rose-500 flex items-center justify-center mb-6 border border-rose-500/10">
                        <i data-lucide="waveform" class="w-6 h-6"></i>
                    </div>
                    <span class="block font-extrabold text-xs mb-1 text-white uppercase tracking-wider">Acoustic</span>
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Music & Sound</span>
                </button>
                <button data-pick="*" class="category-card glass-card p-6 rounded-[32px] text-left">
                    <div class="w-12 h-12 rounded-2xl bg-emerald-600/10 text-emerald-500 flex items-center justify-center mb-6 border border-emerald-500/10">
                        <i data-lucide="files" class="w-6 h-6"></i>
                    </div>
                    <span class="block font-extrabold text-xs mb-1 text-white uppercase tracking-wider">Records</span>
                    <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Raw Documents</span>
                </button>
            </div>
        </section>

        <!-- BROWSE PANE -->
        <section id="browse-pane" class="pane absolute inset-0 overflow-hidden flex flex-col hidden">
            <div class="px-6 mb-6">
                <div class="glass-card h-14 rounded-2xl flex items-center px-5 gap-4">
                    <i data-lucide="search" class="w-5 h-5 text-slate-500"></i>
                    <input id="mobile-search" type="text" placeholder="Search workspace..." class="bg-transparent border-none outline-none text-sm font-bold text-white w-full placeholder:text-slate-600">
                </div>
            </div>
            <div id="file-list" class="flex-1 overflow-y-auto px-6 pb-32 grid grid-cols-2 gap-4"></div>
        </section>

        <!-- TRANSFERS PANE -->
        <section id="transfers-pane" class="pane absolute inset-0 overflow-y-auto px-6 pb-32 pt-2 hidden">
            <div class="flex items-center justify-between mb-10">
                <h3 class="text-2xl font-extrabold text-white italic tracking-tighter uppercase">Traffic</h3>
                <span id="transfer-count-mobile" class="text-[10px] font-extrabold text-blue-500 uppercase tracking-widest bg-blue-500/10 px-4 py-1.5 rounded-full border border-blue-500/20">0 Active</span>
            </div>
            <div id="mobile-transfer-list" class="space-y-4">
                <div class="py-20 flex flex-col items-center justify-center text-center opacity-20">
                    <i data-lucide="satellite" class="w-12 h-12 text-slate-400 mb-6"></i>
                    <p class="text-xs font-bold uppercase tracking-widest">No Active Handshakes</p>
                </div>
            </div>
        </section>

        <!-- SETTINGS PANE -->
        <section id="settings-pane" class="pane absolute inset-0 overflow-y-auto px-6 pb-32 pt-2 hidden">
            <h3 class="text-2xl font-extrabold text-white italic tracking-tighter uppercase mb-10">Intel</h3>
            <div class="space-y-4">
                <div class="glass-card p-6 rounded-[32px]">
                    <span class="block text-[10px] font-extrabold text-slate-500 uppercase tracking-[0.2em] mb-4">Node Address</span>
                    <strong id="settings-host" class="block text-white text-lg font-extrabold tracking-tight italic mb-2">--</strong>
                    <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-500 w-1/3 opacity-50"></div>
                    </div>
                </div>
                <div class="glass-card p-6 rounded-[32px]">
                    <span class="block text-[10px] font-extrabold text-slate-500 uppercase tracking-[0.2em] mb-4">Sync Root</span>
                    <strong id="settings-folder" class="block text-slate-300 text-xs font-mono break-all italic">/</strong>
                </div>
                <button id="btn-rescan" class="w-full py-5 rounded-[24px] bg-rose-500/10 text-rose-500 border border-rose-500/20 font-extrabold text-xs uppercase tracking-[0.2em] mt-8 flex items-center justify-center gap-3 active:bg-rose-500/20 transition-all">
                    <i data-lucide="power" class="w-4 h-4"></i>
                    Terminate Session
                </button>
            </div>
        </section>
    </main>

    <!-- ═══ NAVIGATION DOCK ═══ -->
    <nav class="fixed bottom-0 left-0 right-0 h-24 nav-dock px-10 flex items-center justify-between z-30">
        <button class="dock-item flex flex-col items-center gap-1.5 relative transition-all" data-pane="home">
            <i data-lucide="layout-grid" class="w-6 h-6"></i>
            <span class="text-[9px] font-extrabold uppercase tracking-widest">Console</span>
            <div class="indicator"></div>
        </button>
        <button class="dock-item flex flex-col items-center gap-1.5 relative transition-all" data-pane="browse">
            <i data-lucide="folder-search" class="w-6 h-6"></i>
            <span class="text-[9px] font-extrabold uppercase tracking-widest">Library</span>
            <div class="indicator"></div>
        </button>
        <button class="dock-item flex flex-col items-center gap-1.5 relative transition-all" data-pane="transfers">
            <i data-lucide="activity" class="w-6 h-6"></i>
            <span class="text-[9px] font-extrabold uppercase tracking-widest">Traffic</span>
            <div class="indicator"></div>
        </button>
        <button class="dock-item flex flex-col items-center gap-1.5 relative transition-all" data-pane="settings">
            <i data-lucide="bar-chart-3" class="w-6 h-6"></i>
            <span class="text-[9px] font-extrabold uppercase tracking-widest">Intel</span>
            <div class="indicator"></div>
        </button>
    </nav>

    <!-- ═══ SCANNER MODAL ═══ -->
    <section id="connect-screen" class="fixed inset-0 z-[100] bg-black/90 backdrop-blur-xl hidden flex flex-col">
        <div class="flex-1 relative">
            <video id="scanner-video" class="w-full h-full object-cover opacity-60" playsinline></video>
            <div class="absolute inset-0 scanner-overlay"></div>
            <div class="absolute inset-0 scanner-line"></div>
            
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 border-2 border-white/20 rounded-3xl">
                <div class="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-blue-500 rounded-tl-xl"></div>
                <div class="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-blue-500 rounded-tr-xl"></div>
                <div class="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-blue-500 rounded-bl-xl"></div>
                <div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-blue-500 rounded-br-xl"></div>
            </div>

            <div class="absolute top-16 left-0 right-0 px-10 text-center">
                <h2 class="text-xl font-extrabold text-white tracking-tighter italic uppercase mb-2">Native Pairing</h2>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Align QR Code to establish bridge</p>
            </div>
        </div>
        <div class="p-10 bg-black">
            <button id="btn-scan-start" class="w-full py-5 rounded-[24px] bg-blue-600 text-white font-extrabold text-sm uppercase tracking-widest shadow-lg shadow-blue-600/30 active:scale-95 transition-transform">
                Initialize Scanner
            </button>
            <button id="btn-close-scanner" class="w-full py-4 mt-4 text-[10px] font-extrabold text-slate-500 uppercase tracking-[0.3em]">Cancel Handshake</button>
        </div>
    </section>

    <!-- ═══ UPLOAD TOAST ═══ -->
    <div id="upload-toast" class="fixed bottom-28 left-6 right-6 glass-card rounded-[28px] p-5 flex items-center gap-4 translate-y-20 opacity-0 transition-all z-40 border-blue-500/20 shadow-2xl">
        <div class="w-12 h-12 rounded-2xl bg-blue-600 text-white flex items-center justify-center">
            <i data-lucide="arrow-up-circle" class="w-6 h-6"></i>
        </div>
        <div class="flex-1">
            <p id="upload-toast-label" class="text-[11px] font-extrabold text-white uppercase tracking-wider">Syncing Payload...</p>
            <div class="h-1.5 w-full bg-white/5 rounded-full mt-2 overflow-hidden border border-white/5">
                <div id="upload-toast-fill" class="h-full bg-blue-500 transition-all duration-300" style="width:0%"></div>
            </div>
        </div>
    </div>

    <input id="file-input" type="file" multiple class="hidden">
    <canvas id="scanner-canvas" class="hidden"></canvas>
</div>

<script src="app.js"></script>
<script>
    lucide.createIcons();
    const observer = new MutationObserver(() => lucide.createIcons());
    observer.observe(document.getElementById('app'), { childList: true, subtree: true });
</script>
</body>
</html>
