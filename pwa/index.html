<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LocalBridge Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app">
        <!-- Connection Layer -->
        <section id="connect-screen">
            <div class="hero">
                <h1>LocalBridge</h1>
                <p>Pro-grade file link</p>
            </div>
            
            <div class="scanner-frame">
                <video id="scanner-video" playsinline></video>
                <div class="scan-line"></div>
                <canvas id="scanner-canvas" hidden></canvas>
            </div>

            <button id="btn-scan">Scan to Connect</button>

            <div class="setup-tray">
                <div class="status-pill" id="check-wifi">Wi-Fi</div>
                <div class="status-pill" id="check-camera">Camera</div>
            </div>
        </section>

        <!-- Main Workspace -->
        <section id="browser-screen" class="hidden">
            <header>
                <button id="btn-back-dir" style="background:none; border:none; color:white; font-size:1.2rem;">􀯶</button>
                <h1 id="current-dir-label">Files</h1>
                <button id="btn-upload-pro" style="background:var(--accent); border:none; color:white; width:36px; height:36px; border-radius:10px; font-size:1.2rem;">+</button>
            </header>

            <div id="file-list" class="file-grid">
                <!-- Premium cards injected here -->
            </div>

            <!-- Global Nav -->
            <nav class="nav-bar">
                <div class="nav-item active">
                    <span class="nav-icon">􀭊</span>
                    <span>Browse</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">􀯙</span>
                    <span>Activity</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">􀍟</span>
                    <span>Settings</span>
                </div>
            </nav>
        </section>
    </div>

    <script src="jsQR.js"></script>
    <script src="app.js"></script>
</body>
</html>
