<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LocalBridge Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="gsap.js"></script>
</head>
<body>
    <div id="app">
        <!-- macOS Desktop Environment -->
        <div class="wallpaper-bg"></div>

        <!-- Connection View -->
        <section id="connect-screen" class="view">
            <div class="window-center">
                <div class="mac-window glass-effect">
                    <div class="window-header">
                        <div class="window-controls">
                            <span class="dot red"></span>
                            <span class="dot yellow"></span>
                            <span class="dot green"></span>
                        </div>
                        <div class="title">LocalBridge Link</div>
                    </div>
                    <div class="window-content">
                        <div class="scanner-wrap">
                            <video id="scanner-video" playsinline></video>
                            <div class="laser"></div>
                        </div>
                        <h2>Establish Secure Link</h2>
                        <p>Scan the code on your workstation to begin</p>
                        <button id="btn-scan-start" class="mac-btn primary">Initialize Scanner</button>
                    </div>
                </div>
            </div>
            
            <div class="dock-wrap">
                <div class="dock glass-effect">
                    <div class="dock-item ready" id="pill-wifi">📶 Wi-Fi</div>
                    <div class="dock-item" id="pill-camera">📷 Camera</div>
                </div>
            </div>
        </section>

        <!-- Browser View (Hidden) -->
        <section id="browser-screen" class="view hidden">
            <nav class="mac-navbar glass-effect">
                <div class="nav-left">
                    <button id="btn-back-dir" class="mac-btn-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </button>
                    <div class="breadcrumb-pro" id="current-dir-label">Files</div>
                </div>
                <div class="nav-right">
                    <button id="btn-upload-pro" class="mac-btn-icon primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>
            </nav>

            <div id="file-list" class="pro-grid"></div>

            <div class="dock-wrap">
                <nav class="pro-dock glass-effect">
                    <div class="pro-dock-item active">
                        <span class="dock-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                        </span>
                        <span class="dock-label">Browse</span>
                    </div>
                    <div class="pro-dock-item">
                        <span class="dock-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        </span>
                        <span class="dock-label">Activity</span>
                    </div>
                    <div class="pro-dock-item">
                        <span class="dock-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        </span>
                        <span class="dock-label">System</span>
                    </div>
                </nav>
            </div>
        </section>

        <!-- Hidden canvas for QR -->
        <canvas id="scanner-canvas" hidden></canvas>
    </div>

    <script src="jsQR.js"></script>
    <script src="app.js"></script>
</body>
</html>
