<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LocalBridge Elite</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="gsap.js"></script>
</head>
<body>
    <div id="app">
        <!-- GPU Accelerated Background -->
        <canvas id="aura-canvas"></canvas>

        <!-- Dynamic View Container -->
        <div id="view-viewport">
            <!-- Connection Workspace -->
            <section id="connect-screen" class="view">
                <div class="glass-window" id="setup-window">
                    <div class="window-chrome">
                        <div class="controls">
                            <span class="dot close"></span>
                            <span class="dot minimize"></span>
                            <span class="dot expand"></span>
                        </div>
                        <div class="window-title">Link Workstation</div>
                    </div>
                    
                    <div class="window-body">
                        <div class="pro-scanner">
                            <video id="scanner-video" playsinline></video>
                            <div class="scan-beam"></div>
                            <div class="scan-corners"></div>
                        </div>
                        
                        <h2 class="hero-text">Establish Secure Bridge</h2>
                        <p class="sub-text">Point camera at the QR code on your workstation</p>
                        
                        <div class="button-stack">
                            <button id="btn-scan-start" class="pro-btn primary">Initialize Link</button>
                        </div>
                    </div>
                </div>

                <div class="status-dock glass-effect">
                    <div class="status-group" id="pill-wifi">
                        <span class="status-dot"></span>
                        <span class="status-label">Network</span>
                    </div>
                    <div class="status-divider"></div>
                    <div class="status-group" id="pill-camera">
                        <span class="status-dot"></span>
                        <span class="status-label">Camera</span>
                    </div>
                </div>
            </section>

            <!-- File Explorer Workspace -->
            <section id="browser-screen" class="view hidden">
                <div class="pro-navbar glass-effect">
                    <div class="nav-content">
                        <button id="btn-back-dir" class="icon-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
                        </button>
                        <h1 id="current-dir-label">Workstation</h1>
                        <button id="btn-upload-pro" class="icon-btn accent">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                        </button>
                    </div>
                </div>

                <div id="file-list" class="pro-explorer">
                    <!-- Cards cascade here -->
                </div>

                <nav class="main-dock glass-effect">
                    <div class="dock-nav-item active">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        <span>Files</span>
                    </div>
                    <div class="dock-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        <span>Live</span>
                    </div>
                    <div class="dock-nav-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        <span>System</span>
                    </div>
                </nav>
            </section>
        </div>

        <!-- System Overlays -->
        <canvas id="scanner-canvas" hidden></canvas>
    </div>

    <script src="jsQR.js"></script>
    <script src="app.js"></script>
</body>
</html>
